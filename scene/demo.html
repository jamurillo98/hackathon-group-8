<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Client - Scene Demo</title>
  <style>
    /* --- Reset and base --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      background: #F7F4EC;
      color: #2A2A2A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Page header --- */
    header {
      padding: 20px 32px 12px;
      border-bottom: 1px solid #DDD9D0;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    header p {
      font-size: 0.85rem;
      color: #666;
      margin-top: 2px;
    }

    /* --- Main layout: scene on left, webcam on right --- */
    .main-layout {
      display: flex;
      flex: 1;
      gap: 24px;
      padding: 24px 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    /* --- Scene area (canvas + caption) --- */
    .scene-area {
      flex: 1;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #F7F4EC;
      border: 1px solid #DDD9D0;
    }

    #scene-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Caption / speech bubble near the client figurine */
    #caption {
      position: absolute;
      left: 8%;
      bottom: 10%;
      max-width: 44%;
      background: #fff;
      border: 1px solid #BEBAB2;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 0.82rem;
      line-height: 1.5;
      color: #2A2A2A;
      display: none; /* hidden until a reply arrives */
    }

    /* Mood indicator bar */
    .mood-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: #555;
    }
    .mood-bar span {
      font-weight: 600;
      color: #2A2A2A;
      text-transform: capitalize;
    }

    /* --- Webcam panel --- */
    .webcam-area {
      width: 320px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .webcam-area h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .camera-container {
      position: relative;
      width: 320px;
      height: 240px;
      border: 1px solid #BEBAB2;
      background: #EDEDEA;
      overflow: hidden;
    }

    #webcam-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Mirror the feed horizontally so it feels like a mirror */
      transform: scaleX(-1);
      display: none; /* shown once camera is active */
    }

    .camera-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #888;
      border: none;
    }

    .camera-controls {
      display: flex;
      gap: 8px;
    }

    /* --- Test harness panel --- */
    .test-harness {
      padding: 20px 32px 32px;
      border-top: 1px solid #DDD9D0;
    }

    .test-harness h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .test-harness .fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 600px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
      color: #444;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #BEBAB2;
      border-radius: 3px;
      background: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      color: #2A2A2A;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: #4A6741;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    /* Primary button: muted dark green (single professional accent color) */
    button.primary {
      padding: 8px 18px;
      background: #4A6741;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary:hover {
      background: #3A5433;
    }

    /* Secondary button: outline style */
    button.secondary {
      padding: 8px 14px;
      background: transparent;
      color: #4A6741;
      border: 1px solid #4A6741;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.82rem;
      cursor: pointer;
    }
    button.secondary:hover {
      background: #eef2ed;
    }

    .mode-note {
      margin-top: 8px;
      font-size: 0.78rem;
      color: #999;
    }

    /* --- Narrow screen: stack panels vertically --- */
    @media (max-width: 720px) {
      .main-layout { flex-direction: column; }
      .webcam-area { width: 100%; }
      .camera-container { width: 100%; height: 200px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Virtual Client Scene</h1>
  <p>3D figurine test harness for scenario-based interaction. M3 module.</p>
</header>

<div class="main-layout">

  <!-- Left: 3D scene -->
  <div class="scene-area">
    <div class="canvas-wrapper">
      <canvas id="scene-canvas"></canvas>
      <!-- Speech bubble / caption: appears near the client figurine -->
      <div id="caption"></div>
    </div>
    <div class="mood-bar">
      Current mood: <span id="mood-label">calm</span>
    </div>
  </div>

  <!-- Right: webcam panel -->
  <div class="webcam-area">
    <h2>Your Camera</h2>
    <div class="camera-container">
      <video id="webcam-video" autoplay playsinline muted></video>
      <div class="camera-fallback">Camera unavailable</div>
    </div>
    <div class="camera-controls">
      <button class="secondary" onclick="window.startCamera()">Start Camera</button>
      <button class="secondary" onclick="window.stopCamera()">Stop Camera</button>
    </div>
  </div>

</div>

<!-- Test harness: type student lines and see the scene react -->
<div class="test-harness">
  <h2>Test Harness</h2>
  <div class="fields">

    <div>
      <label for="scenario-input">Scenario</label>
      <input type="text" id="scenario-input"
        value="A client is reporting a data breach at their company and is feeling upset." />
    </div>

    <div>
      <label for="student-input">Your line (student)</label>
      <input type="text" id="student-input"
        placeholder="Type something the student would say..." />
    </div>

    <div class="button-row">
      <button class="primary" id="send-btn">Send</button>
    </div>

    <!-- Quick mood override buttons for direct testing -->
    <div class="button-row" style="margin-top:10px;">
      <span style="font-size:0.78rem;color:#888;align-self:center;">Set mood:</span>
      <button class="secondary" onclick="window.setMood('calm')">Calm</button>
      <button class="secondary" onclick="window.setMood('anxious')">Anxious</button>
      <button class="secondary" onclick="window.setMood('angry')">Angry</button>
      <button class="secondary" onclick="window.setMood('sad')">Sad</button>
      <button class="secondary" onclick="window.setMood('happy')">Happy</button>
      <button class="secondary" onclick="window.setMood('confused')">Confused</button>
    </div>

    <p class="mode-note" id="mode-note"></p>
  </div>
</div>

<script type="module">
  // Import all scene modules
  import { initScene, startLoop, getScene } from './scene.js';
  import { createClientFigure, createStudentFigure } from './figures.js';
  import { initAnimator, setMood as _setMood, startSpeaking, stopSpeaking } from './animator.js';
  import { startCamera as _startCamera, stopCamera as _stopCamera } from './camera-feed.js';

  // Try to import the AI dialogue engine. If missing, we fall back gracefully.
  let dialogueEngine = null;
  const modeNote = document.getElementById('mode-note');

  try {
    // Dynamic import so a missing file does not crash the whole page
    const mod = await import('../ai/dialogue.js');
    dialogueEngine = mod;
    modeNote.textContent = 'AI engine connected.';
  } catch (e) {
    modeNote.textContent = 'AI engine not connected -- running in test mode.';
    console.info('ai/dialogue.js not found, using test mode fallback.');
  }

  // --- Scene setup ---
  const canvas = document.getElementById('scene-canvas');
  initScene(canvas);

  const scene = getScene();
  const clientFig = createClientFigure();
  const studentFig = createStudentFigure();
  scene.add(clientFig);
  scene.add(studentFig);

  initAnimator(clientFig, studentFig);
  startLoop();

  // --- Public API exposed on window ---

  /**
   * window.setMood(mood)
   * Switches the client figurine mood immediately.
   */
  window.setMood = function(mood) {
    _setMood(mood);
    document.getElementById('mood-label').textContent = mood;
  };

  /**
   * window.playSpeaking(durationMs)
   * Triggers the talking animation for the given number of milliseconds.
   */
  window.playSpeaking = function(durationMs) {
    startSpeaking();
    setTimeout(() => stopSpeaking(), durationMs);
  };

  /**
   * window.showReply(text, mood)
   * Displays caption, triggers mood change, and starts the TTS + animation.
   */
  window.showReply = function(text, mood) {
    // Update the caption near the client figurine
    const caption = document.getElementById('caption');
    caption.textContent = text;
    caption.style.display = 'block';

    // Switch mood
    window.setMood(mood || 'calm');

    // Start mouth/gesture animation
    startSpeaking();

    // Use TTS if the dialogue engine exposes speak()
    if (dialogueEngine && typeof dialogueEngine.speak === 'function') {
      dialogueEngine.speak(text, () => {
        // onDone fires when TTS finishes
        stopSpeaking();
      });
    } else {
      // Estimate speaking duration: roughly 60ms per character, minimum 1s
      const estimated = Math.max(1000, text.length * 60);
      setTimeout(() => stopSpeaking(), estimated);
    }
  };

  /**
   * window.startCamera()
   * Requests webcam and streams it to the video element.
   */
  window.startCamera = async function() {
    const video = document.getElementById('webcam-video');
    await _startCamera(video);
  };

  /**
   * window.stopCamera()
   * Stops the webcam stream.
   */
  window.stopCamera = function() {
    const video = document.getElementById('webcam-video');
    _stopCamera(video);
  };

  // --- Test harness: Send button ---
  document.getElementById('send-btn').addEventListener('click', async () => {
    const scenario = document.getElementById('scenario-input').value.trim();
    const studentText = document.getElementById('student-input').value.trim();
    if (!studentText) return;

    let reply = '[AI engine not connected -- running in test mode]';
    let mood = 'calm';

    if (dialogueEngine && typeof dialogueEngine.reply === 'function') {
      try {
        const result = await dialogueEngine.reply(scenario, studentText);
        reply = result.reply || reply;
        mood = result.mood || mood;
      } catch (err) {
        console.warn('dialogue.reply() threw:', err.message);
        // Fall through to defaults
      }
    } else {
      // Test mode: cycle through moods based on keywords so the harness is useful
      const lower = studentText.toLowerCase();
      if (lower.includes('angry') || lower.includes('frustrated')) mood = 'angry';
      else if (lower.includes('sad') || lower.includes('sorry')) mood = 'sad';
      else if (lower.includes('happy') || lower.includes('great')) mood = 'happy';
      else if (lower.includes('confused') || lower.includes('what')) mood = 'confused';
      else if (lower.includes('worried') || lower.includes('anxious')) mood = 'anxious';
    }

    window.showReply(reply, mood);
    document.getElementById('student-input').value = '';
  });

  // Allow pressing Enter in the student input to send
  document.getElementById('student-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('send-btn').click();
  });

  // Auto-start the camera on page load (will gracefully fall back if denied)
  window.startCamera();
</script>

</body>
</html>
