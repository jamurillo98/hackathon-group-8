<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Dialogue Engine , test (M4)</title>
</head>
<body style="font-family:sans-serif;max-width:640px;margin:40px auto;line-height:1.4">
  <h3>Dialogue engine test (M4 only)</h3>
  <p style="color:gray">Type a scenario, click Talk, speak, the client replies + shows a mood. Click End for feedback.</p>

  <textarea id="scenario" rows="2" style="width:100%"
    placeholder="e.g. an anxious patient scared their chest pain is a heart attack"></textarea>

  <div style="margin-top:8px">
    <button id="start">Talk</button>
    <button id="end">End + feedback</button>
  </div>

  <div id="status" style="color:gray;margin:8px 0"></div>
  <div id="mood" style="font-weight:bold;margin:4px 0"></div>
  <pre id="log" style="white-space:pre-wrap;background:#f4f4f4;padding:10px;border-radius:6px"></pre>
  <div id="fb" style="color:#1f7a4d;white-space:pre-wrap;margin-top:10px"></div>

  <!--
    HOW TO TEST THIS:
    The engine calls /api/chat (the Vercel function). That route only exists when the
    app runs on Vercel, or locally via `vercel dev` (see study notes).
    - Easiest: once M1 has deployed to Vercel with the OPENAI_KEY env var set, open the
      deployed URL, this test page works against the real /api/chat.
    - Local with the function: install the Vercel CLI (npm i -g vercel), run `vercel dev`
      in the repo, it serves /api/chat locally using a local env var.
    - Local WITHOUT a backend (UI only): the engine auto-falls-back to rule-based replies
      if /api/chat is not reachable, so you can still see the loop work offline with
      scripted replies. Good enough to test the flow + the figurine handoff.
  -->

  <script type="module">
    import { createDialogue } from "./dialogue.js";

    const dlg = createDialogue();   // no key in the browser, it calls /api/chat
    const $ = (id) => document.getElementById(id);

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new Recognition();
    rec.lang = "en-AU";
    rec.interimResults = false;
    rec.continuous = false;

    $("start").onclick = () => {
      if (!$("scenario").value.trim()) { alert("Type a scenario first"); return; }
      $("status").textContent = "Listening...";
      rec.start();
    };

    rec.onresult = async (e) => {
      const said = e.results[0][0].transcript;
      $("log").textContent += "You: " + said + "\n";
      $("status").textContent = "Thinking...";
      const { reply, mood } = await dlg.reply($("scenario").value, said);
      $("log").textContent += "Client: " + reply + "\n";
      $("mood").textContent = "Client mood: " + mood;
      $("status").textContent = "Speaking...";
      dlg.speak(reply, () => { $("status").textContent = "Your turn, click Talk"; });
    };

    rec.onerror = (e) => { $("status").textContent = "Mic error: " + e.error; };

    $("end").onclick = async () => {
      $("status").textContent = "Getting your feedback...";
      $("fb").textContent = await dlg.getFeedback($("scenario").value);
      $("status").textContent = "Session ended.";
    };
  </script>
</body>
</html>
